<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkerHub - Menu Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

    <nav class="bg-white shadow-xs border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <span class="text-xl font-bold text-indigo-600 tracking-wide">HawkerHub</span>
                    <span class="text-xs bg-indigo-100 text-indigo-800 px-2 py-0.5 rounded-full font-medium">Zhen Yu's Module</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <section class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="w-full md:w-1/2 relative">
                    <label for="search-input" class="sr-only">Search menu items</label>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search items by name or description..." 
                        class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                    >
                    <div class="absolute left-3 top-3.5 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0" id="category-filters">
                    <button onclick="filterCategory('All')" class="category-btn px-4 py-2 text-sm font-medium rounded-lg bg-indigo-600 text-white shadow-xs transition-colors">All Items</button>
                    <button onclick="filterCategory('Mains')" class="category-btn px-4 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">Mains</button>
                    <button onclick="filterCategory('Sides')" class="category-btn px-4 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">Sides</button>
                    <button onclick="filterCategory('Beverages')" class="category-btn px-4 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">Beverages</button>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-tight text-gray-900">Menu Catalog</h2>
                <span id="item-count" class="text-sm text-gray-500 font-medium">Showing 0 items</span>
            </div>
            
            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

            <div id="empty-state" class="hidden text-center py-16 bg-white rounded-xl border border-dashed border-gray-300 mt-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h3 class="mt-4 text-sm font-semibold text-gray-900">No menu items found</h3>
                <p class="mt-1 text-sm text-gray-500">Try adjusting your search query or selected category.</p>
            </div>
        </section>
    </main>

    <div id="details-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center p-4 z-50 opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transform scale-95 transition-transform duration-200">
            <div class="h-48 bg-linear-to-r from-indigo-500 to-purple-600 relative flex items-center justify-center text-white">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/30 hover:bg-black/50 text-white rounded-full p-2 transition-colors focus:outline-hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
                <div class="text-center p-6">
                    <span id="modal-badge" class="px-2.5 py-1 text-xs font-semibold tracking-wide uppercase rounded-full bg-white/20 text-white mb-2 inline-block">Category</span>
                    <h3 id="modal-title" class="text-2xl font-bold tracking-tight">Item Name</h3>
                </div>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Description</h4>
                    <p id="modal-description" class="text-gray-600 leading-relaxed text-sm">Item description.</p>
                </div>
                
                <div class="border-t border-gray-100 pt-4 flex justify-between items-center">
                    <div>
                        <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-0.5">Price</h4>
                        <span id="modal-price" class="text-2xl font-black text-indigo-600">$0.00</span>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-0.5 text-right">Availability</h4>
                        <span id="modal-status" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium">Available</span>
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 px-6 py-4 flex justify-end gap-3 border-t border-gray-100">
                <button onclick="closeModal()" class="px-4 py-2 border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 font-medium text-sm rounded-lg transition-colors shadow-xs">Close Details</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
